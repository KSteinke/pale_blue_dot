<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Mój Skan Ziemi 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; }
        canvas { display: block; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <script>
        // 1. Ustawienie sceny i kamery
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 15;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // 2. Dodanie płynnego sterowania myszką
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; // Nadaje efekt "poślizgu" przy obracaniu
        controls.dampingFactor = 0.05;
        controls.enablePan = false; // Blokuje przesuwanie kuli na boki

        // 3. Tworzenie geometrii kuli (dużo segmentów dla idealnej krągłości)
        const geometry = new THREE.SphereGeometry(5, 128, 128);
        
        // =========================================================
        // TUTAJ ZMIEŃ NAZWĘ PLIKU NA TĘ POBRANĄ Z KREA.AI:
        const earthTexture = new THREE.TextureLoader().load('enhanced_FINALNA_MAPA_360.png'); 
        // =========================================================
        
        // Używamy MeshBasicMaterial, bo nasza mapa z Krea ma już wypalone w sobie światło słoneczne i chmury
        const material = new THREE.MeshBasicMaterial({ 
            map: earthTexture 
        });
        
        const earth = new THREE.Mesh(geometry, material);
        scene.add(earth);

        // 4. Pętla renderująca (obraca Ziemię co klatkę)
        function animate() {
            requestAnimationFrame(animate);
            
            // Automatyczny, powolny obrót Ziemi w okół własnej osi
            earth.rotation.y += 0.0008; 
            
            controls.update(); // Wymagane dla enableDamping
            renderer.render(scene, camera);
        }
        animate();

        // 5. Skalowanie okna (żeby Ziemia nie spłaszczała się przy zmianie rozmiaru przeglądarki)
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
